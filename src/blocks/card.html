<div class="card">
    <a href="#" class="card__image" title="card">
        <img src="images/cards/@@card-image" alt="card">
    </a>
    <div class="card__content">
        <div class="card__info">
            <div class="card__today card__row">
                <div class="card__today--text card__row--text">
                    Today
                </div>
                <div class="card__row--views card__today--views">
                    <div class="card__row--view">
                        <svg class="icon" width="18" height="18">
                            <use href="images/sprite.svg#heart-fill"></use>
                        </svg>
                        <span>128</span>
                    </div>
                    <div class="card__row--view">
                        <svg class="icon" width="18" height="18">
                            <use href="images/sprite.svg#comment-fill"></use>
                        </svg>
                        <span>128</span>
                    </div>
                </div>
            </div>
            <div class="card__date card__row">
                <div class="card__date--text card__row--text">
                    9-08-2016
                </div>
                <div class="card__row--views card__date--views">
                    <div class="card__row--view">
                        <svg class="icon" width="18" height="18">
                            <use href="images/sprite.svg#heart-fill"></use>
                        </svg>
                        <span>128</span>
                    </div>
                    <div class="card__row--view">
                        <svg class="icon" width="18" height="18">
                            <use href="images/sprite.svg#comment-fill"></use>
                        </svg>
                        <span>128</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="card__uploaded">
            <div class="card__uploaded--text">Image upload</div>
            <div class="card__uploaded--date">11-04-2016</div>
        </div>
    </div>
</div>
