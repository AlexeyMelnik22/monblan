<header class="header">
	<div class="header__inner container">
		<a
				aria-label="Home"
				title="Home"
				href="/" class="header__logo logo"
		>
			<svg class="logo__image" width="160" height="22">
				<use href="images/sprite.svg#logo"></use>
			</svg>
		</a>
		<div class="header__content">
			<div class="header__headline">
				<h2 class="h2 header__title">
					monblanproject
				</h2>
				<div class="header__start">
					Start on  17-02-2016
				</div>
			</div>
			<div class="header__info">
				<button type="button" class="header__info--line">
					<span class="header__info--count">
						870
					</span>
					<span class="header__info--text">
						posts
					</span>
				</button>
				<button type="button" class="header__info--line">
					<span class="header__info--count">
						11,787
					</span>
					<span class="header__info--text">
						followers
					</span>
				</button>
				<button type="button" class="header__info--line">
					<span class="header__info--count">
						112
					</span>
					<span class="header__info--text">
						following
					</span>
				</button>
			</div>
			<div class="header__date">
				<span>Date</span>
				<div class="datepicker">
					<div class="datepicker-wrap">
						<input type="text" class="input__control" id="date-input-from" placeholder="from" readonly />
						<div class="datepicker__inner">
							<button class="datepicker-icon datepicker-clear" type="button" aria-label="Очистити дату">
								<svg class="icon" width="16" height="16">
									<use href="images/sprite.svg#bx_bx-clear"></use>
								</svg>
							</button>
							<div class="datepicker-icon">
								<svg class="icon" width="16" height="16">
									<use href="images/sprite.svg#bx_bx-calendar"></use>
								</svg>
							</div>
						</div>
					</div>
					<div class="datepicker-wrap">
						<input type="text" class="input__control" id="date-input-to" placeholder="to" readonly />
						<div class="datepicker__inner">
							<button class="datepicker-icon datepicker-clear" type="button" aria-label="Очистити дату">
								<svg class="icon" width="16" height="16">
									<use href="images/sprite.svg#bx_bx-clear"></use>
								</svg>
							</button>
							<div class="datepicker-icon">
								<svg class="icon" width="16" height="16">
									<use href="images/sprite.svg#bx_bx-calendar"></use>
								</svg>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
</header>
